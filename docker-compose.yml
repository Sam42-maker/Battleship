# docker-compose.yml
services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    depends_on:
      - redis
      - rabbitmq

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"

  redis:
    image: "redis:alpine"

  rabbitmq:
    image: "rabbitmq:3-management"
    ports:
      - "15672:15672" # Dashboard RabbitMQ